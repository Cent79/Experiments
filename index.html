html,body{height:100%;overflow:hidden}

.app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}

.titlebar{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;max-width:1600px;margin:0 auto}
h1{margin:0;font-size:clamp(20px,2.4vw,34px);letter-spacing:-.02em}.subtitle{margin-top:6px;color:rgba(255,255,255,.78);font-size:14px}.count{font-size:13px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);padding:8px 12px;border-radius:999px;white-space:nowrap}
main{flex:1;min-height:0;display:grid;grid-template-columns:minmax(330px,420px) minmax(0,1fr);gap:16px;padding:16px;max-width:1600px;width:100%;margin:0 auto;overflow:hidden}
aside,section.viewer{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);min-height:0;overflow:hidden}
aside{display:flex;flex-direction:column}
.searchbox{flex:0 0 auto;padding:14px;border-bottom:1px solid var(--line);background:var(--panel);z-index:2}
.inputwrap{display:flex;align-items:center;gap:10px;background:#f9fafb;border:1px solid var(--line);border-radius:14px;padding:10px 12px}.inputwrap:focus-within{border-color:var(--brand);box-shadow:0 0 0 4px rgba(15,98,254,.10);background:#fff}input{width:100%;border:0;outline:0;background:transparent;color:var(--ink);font-size:15px}.hint{margin:9px 2px 0;color:var(--muted);font-size:12px;line-height:1.35}

.list{flex:1 1 auto;min-height:0;overflow:auto;padding:8px;overscroll-behavior:contain}

section.viewer{display:flex;flex-direction:column}
.viewerbar{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--panel);z-index:2}.selected-title{min-width:0}.selected-title strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.selected-title span{display:block;color:var(--muted);font-size:12px;margin-top:3px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.actions{display:flex;gap:8px;flex-shrink:0}.btn{appearance:none;border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 11px;border-radius:12px;text-decoration:none;font-size:13px;cursor:pointer}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.btn:hover{border-color:#c7cdd8}.btn.primary:hover{background:var(--brand2)}

</head>

let filtered=[...APPS], selected=null; globalCount.textContent=`${APPS.length} applicazioni indicizzate`;
function normalize(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function fuzzyScore(item,q){if(!q)return 1;const hayName=normalize(item.name),hayId=normalize(item.appid),hay=`${hayName} ${hayId}`;const terms=normalize(q).split(/\s+/).filter(Boolean);let score=0;for(const term of terms){if(hayId===term)score+=100;else if(hayId.startsWith(term))score+=70;else if(hayName.startsWith(term))score+=55;else if(hay.includes(term))score+=35;else{let idx=0,matched=0;for(const ch of term){const p=hay.indexOf(ch,idx);if(p>=0){matched++;idx=p+1}}if(matched===term.length)score+=15+matched/Math.max(hay.length,1);else return 0}}return score}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(){const q=search.value.trim();filtered=APPS.map(app=>({...app,score:fuzzyScore(app,q)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score||a.name.localeCompare(b.name));resultCount.textContent=`${filtered.length} risultati`;if(!filtered.length){list.innerHTML='<div class="empty">Nessun risultato</div>';return}list.innerHTML=filtered.map((app,i)=>`<button class="item ${selected&&selected.appid===app.appid?'active':''}" data-index="${i}"><div class="appname">${escapeHtml(app.name)}</div><div class="appid">${escapeHtml(app.appid)}</div></button>`).join('')}
